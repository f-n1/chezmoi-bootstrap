# Test matrix for setup.sh across supported Linux distros.
#
# Interactive (drop into shell):
#   docker compose run --rm ubuntu
#
# Automated dry-run for one distro:
#   docker compose run --rm ubuntu sh setup.sh --dry-run
#
# Automated dry-run for ALL distros:
#   docker compose --profile test up

x-common: &common
  stdin_open: true
  tty: true
  working_dir: /root
  volumes:
    - root_data:/root
  environment:
    - SSH_BOOTSTRAP_KEY=${SSH_BOOTSTRAP_KEY:-}

x-apt-init: &apt-init
  entrypoint: ["/bin/sh", "-c", "apt-get update -qq && apt-get install -y -qq curl >/dev/null 2>&1; exec \"$$@\"", "--"]

x-dnf-init: &dnf-init
  entrypoint: ["/bin/sh", "-c", "dnf install -y -q curl >/dev/null 2>&1; exec \"$$@\"", "--"]

x-pacman-init: &pacman-init
  entrypoint: ["/bin/sh", "-c", "pacman -Sy --noconfirm curl >/dev/null 2>&1; exec \"$$@\"", "--"]

x-apk-init: &apk-init
  entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null 2>&1; exec \"$$@\"", "--"]

services:
  ubuntu:
    <<: [*common, *apt-init]
    image: ubuntu:24.04
    command: sh

  debian:
    <<: [*common, *apt-init]
    image: debian:bookworm
    command: sh

  fedora:
    <<: [*common, *dnf-init]
    image: cubby:fedora
    command: sh

  rocky:
    <<: [*common, *dnf-init]
    image: rockylinux:9
    command: sh

  archlinux:
    <<: [*common, *pacman-init]
    image: archlinux:latest
    command: sh

  alpine:
    <<: [*common, *apk-init]
    image: alpine:3.21
    command: sh

  # --- profile: test  (automated dry-run) ---

  test-ubuntu:
    <<: [*common, *apt-init]
    image: ubuntu:24.04
    profiles: [test]
    command: sh setup.sh --dry-run

  test-debian:
    <<: [*common, *apt-init]
    image: debian:bookworm
    profiles: [test]
    command: sh setup.sh --dry-run

  test-fedora:
    <<: [*common, *dnf-init]
    image: fedora:41
    profiles: [test]
    command: sh setup.sh --dry-run

  test-rocky:
    <<: [*common, *dnf-init]
    image: rockylinux:9
    profiles: [test]
    command: sh setup.sh --dry-run

  test-archlinux:
    <<: [*common, *pacman-init]
    image: archlinux:latest
    profiles: [test]
    command: sh setup.sh --dry-run

  test-alpine:
    <<: [*common, *apk-init]
    image: alpine:3.21
    profiles: [test]
    command: sh setup.sh --dry-run

volumes:
  root_data: 